name: Build & publish Docker image

on:
  push:
    tags: ["v*"]

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read
  packages: write

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Compute CPU image metadata
        id: meta_cpu
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/plateai
          tags: |
            type=raw,value=${{ github.ref_name }}-cpu
            type=raw,value=cpu

      # CUDA variants disabled during rapid train/validate iterations (long CI).
      # Re-enable cuda11/cuda12 blocks before release when GPU images are needed again.
      # - name: Compute CUDA11 image metadata
      #   id: meta_cuda11
      #   uses: docker/metadata-action@v5
      #   with:
      #     images: ghcr.io/${{ github.repository_owner }}/plateai
      #     tags: |
      #       type=raw,value=${{ github.ref_name }}-cuda11
      #       type=raw,value=cuda11
      #
      # - name: Compute CUDA12 image metadata
      #   id: meta_cuda12
      #   uses: docker/metadata-action@v5
      #   with:
      #     images: ghcr.io/${{ github.repository_owner }}/plateai
      #     tags: |
      #       type=raw,value=${{ github.ref_name }}-cuda12
      #       type=raw,value=cuda12

      - name: Build and push CPU image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile
          push: true
          build-args: |
            PLATEAI_RUNTIME=cpu
          tags: ${{ steps.meta_cpu.outputs.tags }}
          labels: ${{ steps.meta_cpu.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # - name: Build and push CUDA11 image
      #   uses: docker/build-push-action@v6
      #   with:
      #     context: .
      #     file: Dockerfile
      #     push: true
      #     build-args: |
      #       PLATEAI_RUNTIME=cuda11
      #     tags: ${{ steps.meta_cuda11.outputs.tags }}
      #     labels: ${{ steps.meta_cuda11.outputs.labels }}
      #     cache-from: type=gha
      #     cache-to: type=gha,mode=max
      #
      # - name: Build and push CUDA12 image
      #   uses: docker/build-push-action@v6
      #   with:
      #     context: .
      #     file: Dockerfile
      #     push: true
      #     build-args: |
      #       PLATEAI_RUNTIME=cuda12
